name: CI

on:
  pull_request:
    branches: [dev, master]
  push:
    branches: [dev, master]

jobs:
  backend-check:
    name: Backend - Vérification
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installer Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installer les dépendances de base
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install fastapi uvicorn python-dotenv motor pymongo boto3 gTTS bcrypt python-jose[cryptography] "pydantic[email]"

      - name: Vérifier que le backend s'importe sans erreur
        working-directory: ./backend
        env:
          MONGODB_URL: "mongodb://fake-url-for-ci"
          MONGODB_DB_NAME: "fake_db"
          JWT_SECRET: "fake_secret_for_ci_only"
          AWS_ACCESS_KEY_ID: "fake"
          AWS_SECRET_ACCESS_KEY: "fake"
          AWS_REGION: "eu-west-3"
          AWS_BUCKET_NAME: "fake-bucket"
          FRONTEND_URL: "http://localhost:3000"
        run: |
          python -c "import sys; sys.path.insert(0, '.'); from app.routes import auth, jobs; print('Backend OK')"

  frontend-check:
    name: Frontend - Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Installer les dépendances
        working-directory: ./frontend
        run: npm install

      - name: Build du frontend
        working-directory: ./frontend
        env:
          VITE_API_URL: "http://localhost:8000"
        run: npm run build